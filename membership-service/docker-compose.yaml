services:
  rabbitmq:
    image: rabbitmq:4-management
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: user
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "rabbitmq-diagnostics -q ping && rabbitmq-diagnostics -q check_port_connectivity",
        ]
      interval: 10s
      timeout: 5s
      retries: 15

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: modularis_membership
      POSTGRES_USER: modularis
      POSTGRES_PASSWORD: modularis
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modularis -d modularis_membership"]
      interval: 10s
      timeout: 5s
      retries: 15

  membership-service:
    build: .
    environment:
      MODULARIS_SERVICE_NAME: membership-service
      PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/modularis_membership
      SPRING_DATASOURCE_USERNAME: modularis
      SPRING_DATASOURCE_PASSWORD: modularis
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: user
      SPRING_RABBITMQ_PASSWORD: user
      MODULARIS_COMMAND_EXCHANGE: modularis.commands
      MODULARIS_EVENT_EXCHANGE: modularis.events
      MODULARIS_RESPONSE_EXCHANGE: modularis.responses
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8080"
