services:
  nginx:
    image: nginx:1.29-alpine
    ports:
      - "80:80"
    environment:
      NGINX_PORT: 80
      API_GATEWAY_HOST: api-gateway
      API_GATEWAY_PORT: 3000
      WEBHOOK_HOST: webhook-service
      WEBHOOK_PORT: 8081
      PAYMENT_SERVICE_HOST: payment-service
      PAYMENT_SERVICE_PORT: 8080
      ONBOARDING_SERVICE_HOST: onboarding-service
      ONBOARDING_SERVICE_PORT: 3000
      IDENTITY_SERVICE_HOST: identity-service
      IDENTITY_SERVICE_PORT: 8080
      MEMBERSHIP_SERVICE_HOST: membership-service
      MEMBERSHIP_SERVICE_PORT: 8080
    volumes:
      - ./platform/infra/nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./platform/docs/demos/manual-api/manual-api-tests.html:/usr/share/nginx/html/manual-api-tests.html:ro
      - ./platform/docs/demos/manual-api/manual-api-tests.pt-BR.html:/usr/share/nginx/html/manual-api-tests.pt-BR.html:ro
    depends_on:
      api-gateway:
        condition: service_healthy
      webhook-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      onboarding-service:
        condition: service_healthy
      identity-service:
        condition: service_healthy
      membership-service:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:4-management
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: user
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "rabbitmq-diagnostics -q ping && rabbitmq-diagnostics -q check_port_connectivity",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: modularis
      POSTGRES_PASSWORD: modularis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./platform/infra/docker/init-postgres-multidb.sh:/docker-entrypoint-initdb.d/init-postgres-multidb.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modularis -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 15

  postgres-bootstrap:
    image: postgres:17
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: modularis
      PGPASSWORD: modularis
      PGHOST: postgres
      PGPORT: 5432
    volumes:
      - ./platform/infra/docker/init-postgres-multidb.sh:/scripts/init-postgres-multidb.sh:ro
    command: ["sh", "/scripts/init-postgres-multidb.sh"]

  mongo:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 15

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    image: modularis/api-gateway:local
    env_file:
      - ./platform/infra/docker/common.env
      - ./platform/infra/docker/api-gateway.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      onboarding-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health/live >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  onboarding-service:
    build:
      context: ./onboarding-service
      dockerfile: Dockerfile
    image: modularis/onboarding-service:local
    env_file:
      - ./platform/infra/docker/common.env
      - ./platform/infra/docker/onboarding-service.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      postgres-bootstrap:
        condition: service_completed_successfully
      identity-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health/live >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  identity-service:
    build:
      context: ./identity-service
      dockerfile: Dockerfile
    image: modularis/identity-service:local
    env_file:
      - ./platform/infra/docker/common.env
      - ./platform/infra/docker/identity-service.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      postgres-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health/liveness >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  membership-service:
    build:
      context: ./membership-service
      dockerfile: Dockerfile
    image: modularis/membership-service:local
    env_file:
      - ./platform/infra/docker/common.env
      - ./platform/infra/docker/membership-service.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      postgres-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health/liveness >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    image: modularis/payment-service:local
    env_file:
      - ./platform/infra/docker/common.env
      - ./platform/infra/docker/payment-service.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health/live >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  webhook-service:
    build:
      context: ./webhook-service
      dockerfile: Dockerfile
    image: modularis/webhook-service:local
    env_file:
      - ./platform/infra/docker/common.env
      - ./platform/infra/docker/webhook-service.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      postgres-bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/health/live >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
  mongo_data:
