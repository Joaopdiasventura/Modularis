services:
  rabbitmq:
    image: rabbitmq:4-management
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: user
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "rabbitmq-diagnostics -q ping && rabbitmq-diagnostics -q check_port_connectivity",
        ]
      interval: 10s
      timeout: 5s
      retries: 15

  mongo:
    image: mongo:8
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 15

  payment-service:
    build: .
    environment:
      MODULARIS_SERVICE_NAME: payment-service
      PORT: 8080
      MODULARIS_RABBITMQ_URL: amqp://user:user@rabbitmq:5672/
      MODULARIS_COMMAND_EXCHANGE: modularis.commands
      MODULARIS_EVENT_EXCHANGE: modularis.events
      MODULARIS_RESPONSE_EXCHANGE: modularis.responses
      MODULARIS_MONGO_URI: mongodb://mongo:27017
      MODULARIS_MONGO_DATABASE: modularis_payments
      MODULARIS_ALLOWED_CURRENCIES: BRL,USD
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_healthy
    ports:
      - "8084:8080"
