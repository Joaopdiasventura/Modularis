spring:
  application:
    name: ${MODULARIS_SERVICE_NAME:identity-service}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/modularis_identity}
    username: ${SPRING_DATASOURCE_USERNAME:modularis}
    password: ${SPRING_DATASOURCE_PASSWORD:modularis}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:user}
    password: ${SPRING_RABBITMQ_PASSWORD:user}
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

logging:
  structured:
    format:
      console: logstash

modularis:
  rabbitmq:
    command-exchange: ${MODULARIS_COMMAND_EXCHANGE:modularis.commands}
    event-exchange: ${MODULARIS_EVENT_EXCHANGE:modularis.events}
    response-exchange: ${MODULARIS_RESPONSE_EXCHANGE:modularis.responses}
    delivery-limit: ${MODULARIS_RABBITMQ_DELIVERY_LIMIT:5}
  outbox:
    publish-delay: 1s
    max-batch-size: 50
  queues:
    user-create: identity-service.user-create
